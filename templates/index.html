<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Central Ambiental IoT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{

    margin:0;
    padding:0;
    background:#0b1220;
    color:white;
    font-family:Arial, sans-serif;
}

header{

    background:#121b2e;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    border-bottom:2px solid #1e2b45;
}

.container{

    width:95%;
    margin:auto;
    margin-top:20px;
}

.cards{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{

    background:#121b2e;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    text-align:center;
}

.card h2{

    margin:0;
    font-size:18px;
    color:#8ca6db;
}

.valor{

    font-size:42px;
    margin-top:15px;
    font-weight:bold;
}

.historico{

    margin-top:20px;
    text-align:left;
    font-size:14px;
    color:#b8c7e0;
    line-height:1.8;
}

.status{

    margin-top:30px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.statusBox{

    flex:1;
    min-width:220px;
    background:#121b2e;
    border-radius:20px;
    padding:20px;
    text-align:center;
}

.online{

    color:#00ff88;
    font-weight:bold;
}

.offline{

    color:red;
    font-weight:bold;
}

.graficos{

    margin-top:30px;
    display:grid;
    grid-template-columns:1fr;
    gap:30px;
}

.graficoBox{

    background:#121b2e;
    border-radius:20px;
    padding:20px;
}

canvas{

    width:100% !important;
    height:350px !important;
}

button{

    background:#1d8cf8;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
    margin-top:10px;
    font-size:16px;
}

button:hover{

    opacity:0.8;
}

</style>

</head>

<body>

<header>

CENTRAL AMBIENTAL IoT

</header>

<div class="container">

<div class="cards">

<div class="card">

<h2>Temperatura</h2>

<div class="valor"
id="temperatura">

-- °C

</div>

<div class="historico"
id="historicoTemperatura">

</div>

</div>

<div class="card">

<h2>Pressão</h2>

<div class="valor"
id="pressao">

-- hPa

</div>

</div>

<div class="card">

<h2>Altitude</h2>

<div class="valor"
id="altitude">

-- m

</div>

</div>

<div class="card">

<h2>Luminosidade</h2>

<div class="valor"
id="luminosidade">

--

</div>

</div>

</div>

<div class="status">

<div class="statusBox">

<h2>Status ESP32</h2>

<div id="statusESP"
class="offline">

OFFLINE

</div>

</div>

<div class="statusBox">

<h2>Controle LED</h2>

<button onclick="toggleLED()">

Ligar / Desligar LED

</button>

</div>

<div class="statusBox">

<h2>Gráficos</h2>

<button onclick="limparGraficos()">

Limpar Gráficos

</button>

</div>

</div>

<div class="graficos">

<div class="graficoBox">

<canvas id="graficoTemperatura"></canvas>

</div>

<div class="graficoBox">

<canvas id="graficoLuminosidade"></canvas>

</div>

</div>

</div>

<script>

let ultimaTemperatura = 0;
let ultimaPressao = 0;
let ultimaAltitude = 0;
let ultimaLuminosidade = 0;

let ledEstado = false;

const labels = [];

const dadosTemperatura = [];

const dadosLuminosidade = [];

const historicoTemp = [];

const ctxTemp =
document.getElementById(
'graficoTemperatura'
).getContext('2d');

const ctxLum =
document.getElementById(
'graficoLuminosidade'
).getContext('2d');

const graficoTemperatura =
new Chart(ctxTemp, {

    type:'line',

    data:{

        labels:labels,

        datasets:[{

            label:'Temperatura °C',

            data:dadosTemperatura,

            borderWidth:1.2,

            tension:0.35
        }]
    },

    options:{

        responsive:true,

        animation:false,

        scales:{

            y:{

                min:-10,
                max:85
            }
        }
    }
});

const graficoLuminosidade =
new Chart(ctxLum, {

    type:'line',

    data:{

        labels:labels,

        datasets:[{

            label:'Luminosidade',

            data:dadosLuminosidade,

            borderWidth:1.2,

            tension:0.35
        }]
    },

    options:{

        responsive:true,

        animation:false,

        scales:{

            y:{

                min:0,
                max:1000
            }
        }
    }
});

async function atualizarDados(){

    try{

        const resposta =
        await fetch('/api/dados');

        const dados =
        await resposta.json();

        document.getElementById(
        'statusESP'
        ).innerHTML =
        'ONLINE';

        document.getElementById(
        'statusESP'
        ).className =
        'online';

        if(
        dados.temperatura !== undefined
        ){

            ultimaTemperatura =
            dados.temperatura;
        }

        if(
        dados.pressao !== undefined
        ){

            ultimaPressao =
            dados.pressao;
        }

        if(
        dados.altitude !== undefined
        ){

            ultimaAltitude =
            dados.altitude;
        }

        if(
        dados.luminosidade !== undefined
        ){

            ultimaLuminosidade =
            dados.luminosidade;
        }

        document.getElementById(
        'temperatura'
        ).innerHTML =
        ultimaTemperatura.toFixed(1)
        + ' °C';

        document.getElementById(
        'pressao'
        ).innerHTML =
        ultimaPressao.toFixed(1)
        + ' hPa';

        document.getElementById(
        'altitude'
        ).innerHTML =
        ultimaAltitude.toFixed(1)
        + ' m';

        document.getElementById(
        'luminosidade'
        ).innerHTML =
        ultimaLuminosidade;

        const agora =
        new Date();

        const horario =
        agora.toLocaleTimeString();

        labels.push(horario);

        dadosTemperatura.push(
        ultimaTemperatura
        );

        dadosLuminosidade.push(
        ultimaLuminosidade
        );

        historicoTemp.unshift(
        horario +
        ' → ' +
        ultimaTemperatura.toFixed(1) +
        ' °C'
        );

        if(historicoTemp.length > 5){

            historicoTemp.pop();
        }

        document.getElementById(
        'historicoTemperatura'
        ).innerHTML =
        historicoTemp.join('<br>');

        if(labels.length > 80){

            labels.shift();

            dadosTemperatura.shift();

            dadosLuminosidade.shift();
        }

        graficoTemperatura.update();

        graficoLuminosidade.update();

    }catch(erro){

        document.getElementById(
        'statusESP'
        ).innerHTML =
        'OFFLINE';

        document.getElementById(
        'statusESP'
        ).className =
        'offline';

        console.log(erro);
    }
}

async function toggleLED(){

    ledEstado = !ledEstado;

    await fetch('/toggle_led',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            estado:ledEstado
        })
    });
}

function limparGraficos(){

    labels.length = 0;

    dadosTemperatura.length = 0;

    dadosLuminosidade.length = 0;

    historicoTemp.length = 0;

    document.getElementById(
    'historicoTemperatura'
    ).innerHTML = '';

    graficoTemperatura.update();

    graficoLuminosidade.update();
}

setInterval(
atualizarDados,
500
);

</script>

</body>
</html>
