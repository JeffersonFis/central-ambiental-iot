<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central Ambiental IoT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#070b14;
    color:white;
    overflow-x:hidden;
}

.topbar{

    width:100%;
    height:80px;

    background:#0f172a;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 30px;

    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{

    font-size:30px;
    font-weight:bold;
    color:#38bdf8;
}

.online{

    font-size:20px;
    font-weight:bold;
}

.dashboard{

    display:grid;
    grid-template-columns:300px 1fr;

    min-height:calc(100vh - 80px);
}

.sidebar{

    background:#0f172a;

    padding:25px;

    border-right:1px solid rgba(255,255,255,0.08);
}

.menuTitulo{

    color:#94a3b8;
    margin-bottom:25px;
    font-size:18px;
}

.sensorCard{

    background:#111827;

    border-radius:18px;

    padding:20px;

    margin-bottom:20px;

    border-left:5px solid #38bdf8;

    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.sensorNome{

    color:#94a3b8;
    margin-bottom:10px;
    font-size:16px;
}

.sensorValor{

    font-size:38px;
    font-weight:bold;
}

.main{

    padding:25px;
}

.botoes{

    display:flex;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.botao{

    border:none;
    padding:16px 30px;
    border-radius:14px;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.botao:hover{

    transform:scale(1.05);
}

.ligar{

    background:#22c55e;

    box-shadow:0 0 15px rgba(34,197,94,0.4);
}

.desligar{

    background:#ef4444;

    box-shadow:0 0 15px rgba(239,68,68,0.4);
}

.limpar{

    background:#3b82f6;

    box-shadow:0 0 15px rgba(59,130,246,0.4);
}

.csv{

    background:#f59e0b;

    box-shadow:0 0 15px rgba(245,158,11,0.4);
}

.gridTop{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-bottom:25px;
}

.miniCard{

    background:#111827;

    border-radius:20px;

    padding:25px;

    box-shadow:0 0 15px rgba(0,0,0,0.3);

    position:relative;

    overflow:hidden;
}

.miniCard::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:4px;

    background:#38bdf8;
}

.cardTitulo{

    color:#94a3b8;
    margin-bottom:12px;
}

.cardValor{

    font-size:42px;
    font-weight:bold;
}

.graficos{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.chartBox{

    background:#111827;

    border-radius:20px;

    padding:20px;

    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.chartTitulo{

    font-size:20px;
    margin-bottom:20px;
    color:#38bdf8;
}

canvas{

    width:100% !important;
    height:350px !important;
}

.climaBox{

    margin-top:25px;

    background:#111827;

    border-radius:20px;

    padding:30px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.climaIcone{

    font-size:100px;
}

.climaTexto{

    text-align:right;
}

.climaStatus{

    font-size:36px;
    font-weight:bold;
}

.climaDescricao{

    color:#94a3b8;
    margin-top:10px;
    font-size:18px;
}

@media(max-width:1100px){

    .dashboard{

        grid-template-columns:1fr;
    }

    .graficos{

        grid-template-columns:1fr;
    }

    .sidebar{

        border-right:none;

        border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .climaBox{

        flex-direction:column;
        text-align:center;
    }

    .climaTexto{

        text-align:center;
        margin-top:20px;
    }
}

</style>

</head>

<body>

<div class="topbar">

    <div class="logo">
        🌎 CENTRAL AMBIENTAL IOT
    </div>

    <div class="online" id="statusOnline">
        🔴 OFFLINE
    </div>

</div>

<div class="dashboard">

<div class="sidebar">

    <div class="menuTitulo">
        MONITORAMENTO
    </div>

    <div class="sensorCard">

        <div class="sensorNome">
            Temperatura
        </div>

        <div class="sensorValor" id="temp">
            0°C
        </div>

    </div>

    <div class="sensorCard">

        <div class="sensorNome">
            Umidade
        </div>

        <div class="sensorValor" id="umi">
            0%
        </div>

    </div>

    <div class="sensorCard">

        <div class="sensorNome">
            Pressão
        </div>

        <div class="sensorValor" id="pre">
            0
        </div>

    </div>

    <div class="sensorCard">

        <div class="sensorNome">
            Luminosidade
        </div>

        <div class="sensorValor" id="lum">
            0
        </div>

    </div>

</div>

<div class="main">

<div class="botoes">

<button class="botao ligar" onclick="ligarLed()">

💡 LIGAR LED

</button>

<button class="botao desligar" onclick="desligarLed()">

❌ DESLIGAR LED

</button>

<button class="botao limpar" onclick="limparGraficos()">

🗑 LIMPAR GRÁFICOS

</button>

<button class="botao csv" onclick="baixarCSV()">

📥 EXPORTAR CSV

</button>

</div>

<div class="gridTop">

    <div class="miniCard">

        <div class="cardTitulo">
            ALTITUDE
        </div>

        <div class="cardValor" id="alt">
            0m
        </div>

    </div>

    <div class="miniCard">

        <div class="cardTitulo">
            STATUS AMBIENTAL
        </div>

        <div class="cardValor" id="statusTexto">
            NORMAL
        </div>

    </div>

    <div class="miniCard">

        <div class="cardTitulo">
            REDE
        </div>

        <div class="cardValor" id="redeTexto">
            ONLINE
        </div>

    </div>

</div>

<div class="graficos">

    <div class="chartBox">

        <div class="chartTitulo">
            Temperatura em Tempo Real
        </div>

        <canvas id="graficoTemp"></canvas>

    </div>

    <div class="chartBox">

        <div class="chartTitulo">
            Luminosidade em Tempo Real
        </div>

        <canvas id="graficoLum"></canvas>

    </div>

</div>

<div class="climaBox">

    <div class="climaIcone" id="iconeClima">
        ☀️
    </div>

    <div class="climaTexto">

        <div class="climaStatus" id="climaStatus">
            CLIMA ESTÁVEL
        </div>

        <div class="climaDescricao" id="climaDescricao">
            Sistema operando normalmente
        </div>

    </div>

</div>

</div>

</div>

<script>

function criarGrafico(id,label,cor){

    return new Chart(document.getElementById(id),{

        type:'line',

        data:{

            labels:[],

            datasets:[{

                label:label,

                data:[],

                borderColor:cor,

                backgroundColor:cor + '22',

                borderWidth:3,

                tension:0.45,

                fill:true,

                pointRadius:1
            }]
        },

        options:{

            responsive:true,

            animation:false,

            plugins:{

                legend:{

                    labels:{
                        color:'white'
                    }
                }
            },

            scales:{

                x:{

                    ticks:{
                        color:'#94a3b8',
                        maxRotation:0
                    },

                    grid:{
                        color:'rgba(255,255,255,0.05)'
                    }
                },

                y:{

                    ticks:{
                        color:'#94a3b8'
                    },

                    grid:{
                        color:'rgba(255,255,255,0.05)'
                    }
                }
            }
        }
    });
}

const graficoTemp = criarGrafico(
    'graficoTemp',
    'Temperatura °C',
    '#38bdf8'
);

const graficoLum = criarGrafico(
    'graficoLum',
    'Luminosidade',
    '#facc15'
);

graficoLum.options.scales.y.min = 0;
graficoLum.options.scales.y.max = 4095;

async function ligarLed(){

    await fetch('/ligar_led');
}

async function desligarLed(){

    await fetch('/desligar_led');
}

function limparGraficos(){

    graficoTemp.data.labels = [];
    graficoTemp.data.datasets[0].data = [];

    graficoLum.data.labels = [];
    graficoLum.data.datasets[0].data = [];

    graficoTemp.update();
    graficoLum.update();
}

function baixarCSV(){

    window.location.href = "/baixar_csv";
}

async function atualizar(){

    const resposta = await fetch('/ler_dados');

    const dados = await resposta.json();

    graficoTemp.options.scales.y.min =
        dados.temperatura - 5;

    graficoTemp.options.scales.y.max =
        dados.temperatura + 5;

    if(dados.online){

        document.getElementById('statusOnline').innerHTML =
            "🟢 ONLINE";

        document.getElementById('redeTexto').innerHTML =
            "ONLINE";

    }else{

        document.getElementById('statusOnline').innerHTML =
            "🔴 OFFLINE";

        document.getElementById('redeTexto').innerHTML =
            "OFFLINE";
    }

    document.getElementById('temp').innerHTML =
        dados.temperatura + "°C";

    document.getElementById('umi').innerHTML =
        dados.umidade + "%";

    document.getElementById('pre').innerHTML =
        dados.pressao + " hPa";

    document.getElementById('alt').innerHTML =
        dados.altitude + "m";

    document.getElementById('lum').innerHTML =
        dados.luminosidade;

    const agora = new Date().toLocaleTimeString();

    graficoTemp.data.labels.push(agora);

    graficoTemp.data.datasets[0].data.push(dados.temperatura);

    graficoLum.data.labels.push(agora);

    graficoLum.data.datasets[0].data.push(dados.luminosidade);

    if(graficoTemp.data.labels.length > 100){

        graficoTemp.data.labels.shift();
        graficoTemp.data.datasets[0].data.shift();

        graficoLum.data.labels.shift();
        graficoLum.data.datasets[0].data.shift();
    }

    graficoTemp.update();
    graficoLum.update();

    if(!dados.online){

        document.getElementById('iconeClima').innerHTML = "❌";

        document.getElementById('climaStatus').innerHTML =
            "SEM CONEXÃO";

        document.getElementById('climaDescricao').innerHTML =
            "ESP32 desconectado";

        document.getElementById('statusTexto').innerHTML =
            "FALHA";
    }

    else if(dados.temperatura > 32){

        document.getElementById('iconeClima').innerHTML = "🔥";

        document.getElementById('climaStatus').innerHTML =
            "TEMPERATURA ALTA";

        document.getElementById('climaDescricao').innerHTML =
            "Monitoramento necessário";

        document.getElementById('statusTexto').innerHTML =
            "ALERTA";
    }

    else if(dados.luminosidade < 200){

        document.getElementById('iconeClima').innerHTML = "🌙";

        document.getElementById('climaStatus').innerHTML =
            "AMBIENTE ESCURO";

        document.getElementById('climaDescricao').innerHTML =
            "Baixa luminosidade detectada";

        document.getElementById('statusTexto').innerHTML =
            "NOTURNO";
    }

    else{

        document.getElementById('iconeClima').innerHTML = "☀️";

        document.getElementById('climaStatus').innerHTML =
            "CLIMA ESTÁVEL";

        document.getElementById('climaDescricao').innerHTML =
            "Sistema operando normalmente";

        document.getElementById('statusTexto').innerHTML =
            "NORMAL";
    }
}

setInterval(atualizar,1000);

</script>

</body>

</html>
